appId: com.sitemapanalyzer.app
productName: Site Analyzer
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
asar: true
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  artifactName: ${productName}-${version}-${arch}.${ext}
dmg:
  title: ${productName} ${version}
publish:
  provider: github
  releaseType: release
